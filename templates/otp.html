<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-Factor Authentication</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #f8fafc; }
        .card { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 340px; text-align: center; border: 1px solid #eab308; }
        h2 { color: #eab308; margin-bottom: 12px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; text-align: center; color: white; font-size: 20px; letter-spacing: 4px; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background: #eab308; border: none; color: #0f172a; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h2>⚠️ MFA Triggered</h2>
    <p>You are accessing the network outside standard working hours (8:00 AM - 6:00 PM). A verification token has been sent to your registered Email.</p>
    <form action="/verify_otp" method="POST">
        <input type="text" name="otp_code" placeholder="000000" maxlength="6" required>
        <button type="submit">Authorize Session</button>
    </form>
</div>
</body>
</html>
