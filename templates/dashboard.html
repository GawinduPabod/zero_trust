<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zero Trust - Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e9ecef; margin: 0; padding: 0; }
        .navbar { background: #343a40; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h2 { margin: 0; font-size: 20px; }
        .logout-btn { background: #dc3545; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-size: 14px; }
        .logout-btn:hover { background: #c82333; }
        .container { padding: 40px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 60%; }
        h1 { color: #28a745; }
        p { color: #555; font-size: 16px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Zero Trust Access Control</h2>
        <a href="/" class="logout-btn">Logout</a>
    </div>

    <div class="container">
        <div class="card">
            <h1>Access Granted!</h1>
            <h2>Welcome, {{ username }}</h2>
            <p>ඔබගේ පිවිසුම් සන්දර්භය (Context) ආරක්ෂිත බව තහවුරු කර ඇත. Zero Trust Architecture (ZTA) යටතේ ඔබට පද්ධතියට ප්‍රවේශය ලබා දී ඇත.</p>
        </div>
    </div>

</body>
</html>
