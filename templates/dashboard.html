<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intranet Terminal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #f8fafc; }
        .card { background: #1e293b; padding: 40px; border-radius: 16px; text-align: center; max-width: 400px; border: 1px solid #334155; }
        h1 { color: #38bdf8; }
        a { color: #f43f5e; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h1>🔓 Access Granted</h1>
    <p>Welcome to the secure corporate intranet network, <strong>{{ username }}</strong>.</p>
    <p style="color: #64748b; font-size: 14px;">Your node connection is now encrypted and monitored under continuous compliance rules.</p>
    <br>
    <a href="/">Disconnect Session (Logout)</a>
</div>
</body>
</html>
